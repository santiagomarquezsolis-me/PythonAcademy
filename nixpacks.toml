[phases.setup]
nixPkgs = ["python311", "nodejs_20"]

[phases.install]
dependsOn = ["setup"]
cmds = [
  "cd backend && pip install -r requirements.txt",
  "cd frontend && npm install"
]

[phases.build]
dependsOn = ["install"]
cmds = [
  "cd frontend && npm run build"
]

[start]
cmd = "cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT"
